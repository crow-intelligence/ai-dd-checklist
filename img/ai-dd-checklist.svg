<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 150" width="550" height="150">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="40" y="25" width="70" height="100" rx="6" />
    <line x1="55" y1="45" x2="85" y2="45" />
    <line x1="55" y1="65" x2="95" y2="65" />
    <line x1="55" y1="85" x2="80" y2="85" />
    <rect x="100" y="40" width="10" height="10" rx="2" />
    <rect x="100" y="80" width="10" height="10" rx="2" />
  </g>

  <g filter="url(#neonGlow)" fill="none" stroke="url(#checkGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 70,85 L 100,115 L 145,50" />
  </g>

  <path d="M 70,85 L 100,115 L 145,50" fill="none" stroke="#1A1B20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <g fill="#FFFFFF">
    <circle cx="70" cy="85" r="3" />
    <circle cx="100" cy="115" r="3.5" />
    <circle cx="145" cy="50" r="3" />
  </g>

  <text x="175" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ECF0F1" letter-spacing="-1">ai-dd-checklist</text>
  
  <text x="178" y="110" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="1">nlp due diligence framework</text>
</svg>
